<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Login - SMC SmartConnect</title>
  <link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --primary: #0f172a;
      --secondary: #1e293b;
      --accent: #2563eb;
      --accent-hover: #1d4ed8;
      --text: #f8fafc;
      --text-muted: #94a3b8;
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Be Vietnam Pro', sans-serif;
    }
    
    body { 
      background: linear-gradient(135deg, #0f172a 0%, #1e3a8a 100%);
      display: flex; 
      align-items: center; 
      justify-content: center; 
      height: 100vh; 
      color: var(--text);
      overflow: hidden;
    }
    
    /* Background animated elements */
    .bg-shape {
      position: absolute;
      filter: blur(80px);
      z-index: -1;
      opacity: 0.5;
    }
    
    .bg-shape-1 {
      top: -10%; left: -10%;
      width: 500px; height: 500px;
      background: #3b82f6;
      border-radius: 50%;
      animation: float 10s ease-in-out infinite;
    }
    
    .bg-shape-2 {
      bottom: -10%; right: -10%;
      width: 400px; height: 400px;
      background: #1d4ed8;
      border-radius: 50%;
      animation: float 8s ease-in-out infinite reverse;
    }
    
    @keyframes float {
      0% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-20px) scale(1.05); }
      100% { transform: translateY(0) scale(1); }
    }

    .login-container { 
      max-width: 420px; 
      width: 90%; 
      padding: 3rem 2.5rem; 
      background: rgba(30, 41, 59, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(255, 255, 255, 0.1);
      border-radius: 20px; 
      box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); 
      animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }
    
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .brand {
      text-align: center;
      margin-bottom: 2rem;
    }
    
    .brand img {
      width: 80px;
      margin-bottom: 15px;
    }
    
    .brand h3 {
      font-size: 24px;
      font-weight: 700;
      letter-spacing: -0.5px;
      background: linear-gradient(to right, #60a5fa, #3b82f6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    
    .brand p {
      color: var(--text-muted);
      font-size: 14px;
      margin-top: 5px;
    }

    .alert {
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.3);
      color: #f87171;
      padding: 12px 15px;
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .input-group {
      margin-bottom: 1.5rem;
      position: relative;
    }
    
    .input-group i {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted);
      font-size: 18px;
      transition: 0.3s;
    }

    .form-control {
      width: 100%;
      background: rgba(15, 23, 42, 0.5);
      border: 1px solid rgba(255, 255, 255, 0.1);
      color: white;
      padding: 14px 16px 14px 45px;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: all 0.3s;
    }
    
    .form-control::placeholder {
      color: var(--text-muted);
    }
    
    .form-control:focus {
      border-color: var(--accent);
      background: rgba(15, 23, 42, 0.8);
      box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.15);
    }
    
    .form-control:focus + i {
      color: var(--accent);
    }

    .btn-login {
      background: var(--accent);
      color: white;
      border: none;
      width: 100%;
      padding: 14px;
      border-radius: 12px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 10px;
      position: relative;
      overflow: hidden;
    }
    
    .btn-login:hover {
      background: var(--accent-hover);
      transform: translateY(-2px);
      box-shadow: 0 10px 20px -10px rgba(37, 99, 235, 0.6);
    }
    
    .btn-login:active {
      transform: translateY(0);
    }
    
    .footer-text {
      text-align: center;
      margin-top: 2rem;
      font-size: 13px;
      color: var(--text-muted);
    }
    
    .footer-text a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }
  </style>
</head>
<body>
  <div class="bg-shape bg-shape-1"></div>
  <div class="bg-shape bg-shape-2"></div>

  <div class="login-container">
    <div class="brand">
      <img th:src="@{/images/logo.png}" alt="SMC Logo" onerror="this.src='https://ui-avatars.com/api/?name=SMC&background=2563eb&color=fff&rounded=true&size=80'">
      <h3>SMC SmartConnect</h3>
      <p>Hệ thống Quản trị Nội dung (CMS)</p>
    </div>
    
    <div th:if="${error}" class="alert">
      <i class="fa-solid fa-circle-exclamation"></i>
      <span th:text="${error}"></span>
    </div>
    
    <form th:action="@{/admin/login}" method="POST">
      <div class="input-group">
        <input type="text" name="username" class="form-control" placeholder="Tên đăng nhập" required autocomplete="off">
        <i class="fa-solid fa-user"></i>
      </div>
      
      <div class="input-group">
        <input type="password" name="password" class="form-control" placeholder="Mật khẩu" required>
        <i class="fa-solid fa-lock"></i>
      </div>
      
      <button type="submit" class="btn-login">Đăng nhập <i class="fa-solid fa-arrow-right" style="margin-left: 8px;"></i></button>
    </form>
    
    <div class="footer-text">
      Quay lại <a href="/">Trang chủ</a>
    </div>
  </div>
</body>
</html>
