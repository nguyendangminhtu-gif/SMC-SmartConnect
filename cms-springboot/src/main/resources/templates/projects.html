<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head(title='Dự án & Đối tác')}"></head>
<body>
  
  <div th:replace="~{fragments/sidebar :: sidebar(active='projects')}"></div>

  <div class="main-content">
    <div th:replace="~{fragments/topbar :: topbar(title='Dự án & Đối tác')}"></div>
    
    <div class="content-wrapper">
        <div class="row">
            <!-- Projects -->
            <div class="col-12 mb-4">
                <div class="card p-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 style="font-weight: 700; color: #1e293b; margin: 0;">Quản lý Dự án</h5>
                        <button class="btn btn-primary" onclick="showAddProjForm()"><i class="fa-solid fa-plus"></i> Thêm dự án</button>
                    </div>
                    <div class="table-card">
                        <table class="table table-hover mt-3">
                            <thead>
                                <tr>
                                    <th>TÊN DỰ ÁN</th>
                                    <th>HÌNH ẢNH</th>
                                    <th>THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="p : ${projects}">
                                    <td th:text="${p.title}" style="font-weight: 600;"></td>
                                    <td style="width: 150px;"><img th:if="${p.imageUrl != null}" th:src="${p.imageUrl.startsWith('/') ? p.imageUrl : '/' + p.imageUrl}" class="image-preview"></td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-outline-warning" 
                                                th:onclick="editProj([[${p.id}]], [[${p.title}]], [[${p.description}]], [[${p.imageUrl}]])"><i class="fa-solid fa-pen"></i> Sửa</button>
                                        <form th:action="@{/admin/projects/project/delete/{id}(id=${p.id})}" method="POST" style="display:inline;" onsubmit="event.preventDefault(); confirmDelete(this);">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

            <!-- Partners -->
            <div class="col-12">
                <div class="card p-4 mb-4">
                    <div class="d-flex justify-content-between align-items-center mb-4">
                        <h5 style="font-weight: 700; color: #1e293b; margin: 0;">Quản lý Đối tác</h5>
                        <button class="btn btn-primary" onclick="showAddPartnerForm()"><i class="fa-solid fa-plus"></i> Thêm đối tác</button>
                    </div>
                    <div class="table-card">
                        <table class="table table-hover mt-3">
                            <thead>
                                <tr>
                                    <th>TÊN ĐỐI TÁC</th>
                                    <th>LOGO</th>
                                    <th>THAO TÁC</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="pt : ${partners}">
                                    <td th:text="${pt.name}" style="font-weight: 600;"></td>
                                    <td style="width: 150px;"><img th:if="${pt.logoUrl != null}" th:src="${pt.logoUrl.startsWith('/') ? pt.logoUrl : '/' + pt.logoUrl}" class="image-preview" style="object-fit: contain; background: white;"></td>
                                    <td>
                                        <button type="button" class="btn btn-sm btn-outline-warning" 
                                                th:onclick="editPartner([[${pt.id}]], [[${pt.name}]], [[${pt.logoUrl}]])"><i class="fa-solid fa-pen"></i> Sửa</button>
                                        <form th:action="@{/admin/projects/partner/delete/{id}(id=${pt.id})}" method="POST" style="display:inline;" onsubmit="event.preventDefault(); confirmDelete(this);">
                                            <button type="submit" class="btn btn-sm btn-outline-danger"><i class="fa-solid fa-trash"></i> Xóa</button>
                                        </form>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>

    </div>
  </div>

  <!-- Modal Project Form -->
  <div class="modal fade" id="projModal" tabindex="-1" aria-labelledby="projModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="projModalLabel">Thêm/Sửa Dự án</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <form th:action="@{/admin/projects/project/save}" method="POST" enctype="multipart/form-data" id="projForm" onsubmit="event.preventDefault(); confirmSave(this);">
                <input type="hidden" name="id" id="edit-proj-id">
                <div class="mb-4">
                    <label class="form-label">Tên dự án *</label>
                    <input type="text" name="title" id="edit-proj-title" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Tải lên Hình ảnh *</label>
                    <input type="file" name="image" class="form-control" accept="image/*" onchange="previewProjImage(this)">
                    <img id="proj-image-preview" class="image-upload-preview" src="">
                </div>
                <div class="mb-4">
                    <label class="form-label">Mô tả ngắn</label>
                    <textarea name="description" id="edit-proj-desc" class="form-control" rows="3" required></textarea>
                </div>
            </form>
        </div>
        <div class="modal-footer" style="justify-content: flex-start;">
          <button type="button" class="btn btn-primary" onclick="document.getElementById('projForm').requestSubmit();" style="padding: 12px 30px; font-size: 16px;">Lưu Dự án</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal Partner Form -->
  <div class="modal fade" id="partnerModal" tabindex="-1" aria-labelledby="partnerModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="partnerModalLabel">Thêm/Sửa Đối tác</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <form th:action="@{/admin/projects/partner/save}" method="POST" enctype="multipart/form-data" id="partnerForm" onsubmit="event.preventDefault(); confirmSave(this);">
                <input type="hidden" name="id" id="edit-partner-id">
                <div class="mb-4">
                    <label class="form-label">Tên đối tác *</label>
                    <input type="text" name="name" id="edit-partner-name" class="form-control" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Tải lên Logo *</label>
                    <input type="file" name="logo" class="form-control" accept="image/*" onchange="previewPartnerImage(this)">
                    <img id="partner-image-preview" class="image-upload-preview" src="" style="background: #f8fafc;">
                </div>
            </form>
        </div>
        <div class="modal-footer" style="justify-content: flex-start;">
          <button type="button" class="btn btn-primary" onclick="document.getElementById('partnerForm').requestSubmit();" style="padding: 12px 30px; font-size: 16px;">Lưu Đối tác</button>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments/scripts :: scripts}"></div>
  <script>
      let projModalInstance, partnerModalInstance;
      document.addEventListener("DOMContentLoaded", function(){
          projModalInstance = new bootstrap.Modal(document.getElementById('projModal'));
          partnerModalInstance = new bootstrap.Modal(document.getElementById('partnerModal'));
      });

      function showAddProjForm() {
          document.getElementById('edit-proj-id').value = '';
          document.getElementById('edit-proj-title').value = '';
          document.getElementById('edit-proj-desc').value = '';
          document.getElementById('proj-image-preview').style.display = 'none';
          document.getElementById('projModalLabel').innerText = 'Thêm Dự án Mới';
          projModalInstance.show();
      }

      function editProj(id, title, desc, imageUrl) {
          document.getElementById('edit-proj-id').value = id;
          document.getElementById('edit-proj-title').value = title;
          document.getElementById('edit-proj-desc').value = desc;
          if(imageUrl) {
              document.getElementById('proj-image-preview').src = imageUrl;
              document.getElementById('proj-image-preview').style.display = 'block';
          } else {
              document.getElementById('proj-image-preview').style.display = 'none';
          }
          document.getElementById('projModalLabel').innerText = 'Chỉnh sửa Dự án';
          projModalInstance.show();
      }

      function showAddPartnerForm() {
          document.getElementById('edit-partner-id').value = '';
          document.getElementById('edit-partner-name').value = '';
          document.getElementById('partner-image-preview').style.display = 'none';
          document.getElementById('partnerModalLabel').innerText = 'Thêm Đối tác Mới';
          partnerModalInstance.show();
      }

      function editPartner(id, name, logoUrl) {
          document.getElementById('edit-partner-id').value = id;
          document.getElementById('edit-partner-name').value = name;
          if(logoUrl) {
              document.getElementById('partner-image-preview').src = logoUrl;
              document.getElementById('partner-image-preview').style.display = 'block';
          } else {
              document.getElementById('partner-image-preview').style.display = 'none';
          }
          document.getElementById('partnerModalLabel').innerText = 'Chỉnh sửa Đối tác';
          partnerModalInstance.show();
      }
      
      function previewProjImage(input) {
          if (input.files && input.files[0]) {
              var reader = new FileReader();
              reader.onload = function(e) {
                  document.getElementById('proj-image-preview').src = e.target.result;
                  document.getElementById('proj-image-preview').style.display = 'block';
              }
              reader.readAsDataURL(input.files[0]);
          }
      }

      function previewPartnerImage(input) {
          if (input.files && input.files[0]) {
              var reader = new FileReader();
              reader.onload = function(e) {
                  document.getElementById('partner-image-preview').src = e.target.result;
                  document.getElementById('partner-image-preview').style.display = 'block';
              }
              reader.readAsDataURL(input.files[0]);
          }
      }
  </script>
</body>
</html>
